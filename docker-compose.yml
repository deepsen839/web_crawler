version: "3.9"

services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: company-research-backend

    restart: unless-stopped

    ports:
      - "8000:8000"

    volumes:
      - ./backend:/app

    networks:
      - company-network

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile

    container_name: company-research-frontend

    restart: unless-stopped

    depends_on:
      backend:
        condition: service_healthy

    ports:
      - "3000:80"

    networks:
      - company-network

networks:
  company-network:
    driver: bridge